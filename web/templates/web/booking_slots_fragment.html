{% for t, label in slots %}
<button type="button" class="slot-btn rounded-lg border border-slate-200 dark:border-gray-600 px-4 py-2 text-sm font-medium text-slate-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:border-indigo-300 dark:hover:border-indigo-700 transition"
        data-time="{{ label }}">{{ label }}</button>
{% empty %}
<p class="text-sm text-slate-500 dark:text-gray-400">Bu tarih için uygun saat yok.</p>
{% endfor %}
