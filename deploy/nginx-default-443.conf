# === بلوک کامل server برای HTTPS (کپی در /etc/nginx/sites-available/default) ===
# اگر الان بلوک listen 443 دارید، فقط location ها را با این عوض کنید.
# مسیرهای SSL را اگر با certbot دارید همان‌ها را نگه دارید.

server {
    listen 443 ssl;
    server_name heryerrandevu.com.tr;

    # مسیر گواهی SSL (اگر با certbot نصب کرده‌اید معمولاً این‌طور است)
    ssl_certificate /etc/letsencrypt/live/heryerrandevu.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heryerrandevu.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # استاتیک ادمین جنگو (CSS و تصاویر)
    location /static/ {
        alias /srv/appointment/staticfiles/;
    }

    # اپلیکیشن
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
